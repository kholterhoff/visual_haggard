<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title">
  <title>Visual Haggard favicon</title>
  <defs>
    <linearGradient id="vh-gradient" x1="18%" y1="84%" x2="82%" y2="16%">
      <stop offset="0%" stop-color="#41ADF1" />
      <stop offset="100%" stop-color="#976FEB" />
    </linearGradient>
    <radialGradient id="vh-glow" cx="28%" cy="24%" r="62%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.28" />
      <stop offset="58%" stop-color="#FFFFFF" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </radialGradient>
  </defs>

  <circle cx="32" cy="32" r="31" fill="url(#vh-gradient)" />
  <circle cx="32" cy="32" r="31" fill="url(#vh-glow)" />
  <circle cx="32" cy="32" r="30.75" fill="none" stroke="#0C1F46" stroke-opacity="0.2" stroke-width="0.5" />

  <text
    x="32"
    y="32"
    text-anchor="middle"
    dominant-baseline="central"
    dy="1.5"
    font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
    font-size="24"
    font-weight="700"
    letter-spacing="-1.8"
    fill="#F9FBFF"
  >VH</text>
</svg>
